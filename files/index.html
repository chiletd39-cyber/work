<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LiveChat — Real-Time Chat App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ══════════════════════════════════════════
       JOIN SCREEN
  ═══════════════════════════════════════════ -->
  <div id="join-screen" class="screen active">
    <div class="join-box">
      <div class="join-logo">💬</div>
      <h1>LiveChat</h1>
      <p class="join-subtitle">Real-time messaging, instantly.</p>

      <div class="form-group">
        <label for="username-input">Your Name</label>
        <input
          type="text"
          id="username-input"
          placeholder="Enter a username..."
          maxlength="20"
          autocomplete="off"
        />
      </div>

      <div class="form-group">
        <label for="room-input">Room (optional)</label>
        <input
          type="text"
          id="room-input"
          placeholder="General"
          maxlength="30"
          autocomplete="off"
        />
      </div>

      <p id="join-error" class="error-text"></p>

      <button id="join-btn" class="btn-primary">Join Chat →</button>
    </div>
  </div>

  <!-- ══════════════════════════════════════════
       CHAT SCREEN
  ═══════════════════════════════════════════ -->
  <div id="chat-screen" class="screen">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <span class="logo-icon">💬</span>
        <span class="logo-text">LiveChat</span>
      </div>

      <div class="sidebar-section">
        <h3>Rooms</h3>
        <ul id="rooms-list"></ul>
        <div class="new-room">
          <input type="text" id="new-room-input" placeholder="New room name..." maxlength="30" />
          <button id="new-room-btn" title="Join/Create Room">+</button>
        </div>
      </div>

      <div class="sidebar-section">
        <h3>Online — <span id="online-count">0</span></h3>
        <ul id="users-list"></ul>
      </div>

      <div class="sidebar-footer">
        <span id="my-username-display"></span>
        <button id="leave-btn" title="Leave chat">⏻</button>
      </div>
    </aside>

    <!-- Main Chat Area -->
    <main class="chat-main">
      <header class="chat-header">
        <button id="sidebar-toggle" class="sidebar-toggle">☰</button>
        <div class="chat-header-info">
          <span class="room-icon">#</span>
          <span id="current-room-display">General</span>
        </div>
        <div id="connection-status" class="status-dot connected" title="Connected"></div>
      </header>

      <div id="messages-container" class="messages-container">
        <div class="welcome-message">
          <span>🎉</span>
          <p>Welcome! Messages will appear here.</p>
        </div>
      </div>

      <div id="typing-indicator" class="typing-indicator"></div>

      <footer class="chat-footer">
        <input
          type="text"
          id="message-input"
          placeholder="Type a message..."
          maxlength="500"
          autocomplete="off"
        />
        <button id="send-btn" class="btn-send" title="Send">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </footer>
    </main>

  </div>

  <!-- Socket.io client (served automatically by server) -->
  <script src="/socket.io/socket.io.js"></script>
  <!-- Frontend logic -->
  <script src="app.js"></script>
</body>
</html>
